<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anigraph</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a class="link-btn anilist-home" href="https://anilist.co" target="_blank" rel="noopener">AniList ↗</a>
    <h1>anigraph</h1>
    <div class="controls">
      <label class="file-label">
        Import anime list
        <input id="file-input" type="file" accept=".txt" />
        <span class="file-hint">One title per line</span>
      </label>
      <button id="search-btn" type="button" disabled>Search</button>
    </div>
    <section id="results"></section>
    <script src="js/main.js"></script>
  </body>
</html>
