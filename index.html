<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anigraph</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="topbar">
        <h1 class="site-title">anigraph</h1>
        <div class="media-type-switch">
          <button class="mode-btn media-type-btn active" data-type="ANIME">Anime</button>
          <button class="mode-btn media-type-btn" data-type="MANGA">Manga</button>
          <button class="mode-btn media-type-btn" data-type="NOVEL">Novel</button>
        </div>
        <input id="graph-search" type="text" class="graph-search" placeholder="Filter results…" />
        <a class="link-btn anilist-home" href="https://anilist.co" target="_blank" rel="noopener">AniList ↗</a>
      </header>
      <div class="content-area">
        <aside class="sidebar-left">
          <div id="stats"></div>
        </aside>
        <main class="center">
          <section id="results"></section>
        </main>
        <aside class="sidebar-right">
          <div class="settings">
            <p class="label">Input</p>
            <div class="mode-switch">
              <button class="mode-btn input-btn active" data-input="local">Local</button>
              <button class="mode-btn input-btn" data-input="popular">Popular</button>
              <button class="mode-btn input-btn" data-input="profile">Profile</button>
            </div>
            <div id="input-local" class="setting-panel">
              <label class="file-label">
                Import anime list
                <input id="file-input" type="file" accept=".txt" />
                <span class="file-hint">One title per line</span>
              </label>
            </div>
            <div id="input-popular" class="setting-panel" style="display:none">
              <div class="mode-switch" style="flex-wrap:wrap">
                <button class="mode-btn popular-btn active" data-count="10">Top 10</button>
                <button class="mode-btn popular-btn" data-count="50">Top 50</button>
                <button class="mode-btn popular-btn" data-count="100">Top 100</button>
                <button class="mode-btn popular-btn" data-count="200">Top 200</button>
                <button class="mode-btn popular-btn" data-count="300">Top 300</button>
              </div>
            </div>
            <div id="input-profile" class="setting-panel" style="display:none">
              <input id="profile-username" type="text" placeholder="AniList username" class="text-input" />
              <span class="file-hint">Profile must be public</span>
            </div>
          </div>
          <button id="search-btn" type="button" disabled>Search</button>
          <p id="feedback" class="feedback"></p>
          <div class="settings">
            <p class="label">Visuals</p>
            <label class="vis-row"><input type="checkbox" id="vis-connections" checked> Connections</label>
            <label class="vis-row"><input type="checkbox" id="vis-covers" checked> Anime covers</label>
            <label class="vis-row"><input type="checkbox" id="vis-clusters" checked> Clusters</label>
            <label class="vis-row"><input type="checkbox" id="vis-labels" checked> Labels</label>
          </div>
          <div class="settings">
            <p class="label">Connections</p>
            <div class="setting-panel">
              <div class="slider-row"><span>Spring strength</span><span id="spring-val">4</span></div>
              <input type="range" id="spring-slider" min="0" max="10" value="4" />
            </div>
            <div class="mode-switch">
              <button class="mode-btn active" data-mode="percent">Accpt %</button>
              <button class="mode-btn" data-mode="count">Top N</button>
              <button class="mode-btn" data-mode="top-pct">Top %</button>
              <button class="mode-btn" data-mode="genres">Genres</button>
            </div>
            <div id="setting-percent" class="setting-panel">
              <div class="slider-row"><span>Min. acceptance</span><span id="percent-val">80</span><span>%</span></div>
              <input type="range" id="percent-slider" min="0" max="100" value="80" />
            </div>
            <div id="setting-count" class="setting-panel" style="display:none">
              <div class="slider-row"><span>Top tags</span><span id="count-val">5</span></div>
              <input type="range" id="count-slider" min="1" max="20" value="5" />
            </div>
            <div id="setting-top-pct" class="setting-panel" style="display:none">
              <div class="slider-row"><span>Top</span><span id="top-pct-val">25</span><span>%</span></div>
              <input type="range" id="top-pct-slider" min="1" max="100" value="25" />
            </div>
          </div>
          <div class="settings">
            <p class="label">Clusters</p>
            <div class="setting-panel">
              <div class="slider-row"><span>Min size</span><span id="cluster-min-val">3</span></div>
              <input type="range" id="cluster-min-slider" min="1" max="99" value="3" />
            </div>
          </div>
        </aside>
      </div>
    </div>
    <svg id="clusters-svg"></svg>
    <svg id="connections-svg"></svg>
    <svg id="labels-svg"></svg>
    <div id="popup" class="anime-popup"></div>
    <script src="js/main.js"></script>
  </body>
</html>
